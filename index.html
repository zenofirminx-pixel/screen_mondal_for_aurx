<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AurX AI - Déconnecté</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: radial-gradient(circle at center, #0a0a12 0%, #020205 100%);
    color: #fff;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* AURORA GLOW DYNAMIQUE */
  .aurora {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .aurora::before,
  .aurora::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.18;
    animation: auroraMove 16s infinite ease-in-out;
  }

  .aurora::before {
    background: #0A84FF;
    top: -150px;
    left: -50px;
  }

  .aurora::after {
    background: #BF5AF2;
    bottom: -150px;
    right: -50px;
    animation-delay: -8s;
  }

  @keyframes auroraMove {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, -30px) scale(1.15); }
  }

  /* FLUX DE PARTICULES ACCÉLÉRÉ */
  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 1.5px;
    height: 1.5px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: drift 20s infinite linear;
  }

  @keyframes drift {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
  }

  .particle:nth-child(1) { left: 15%; animation-delay: 0s; animation-duration: 18s; }
  .particle:nth-child(2) { left: 35%; animation-delay: -4s; animation-duration: 22s; }
  .particle:nth-child(3) { left: 55%; animation-delay: -2s; animation-duration: 16s; }
  .particle:nth-child(4) { left: 75%; animation-delay: -7s; animation-duration: 24s; }
  .particle:nth-child(5) { left: 90%; animation-delay: -5s; animation-duration: 20s; }

  /* CELLULES HOLOGRAPHIQUES FLOUTÉES */
  .bubbles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .bubble {
    position: absolute;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.4);
    text-align: center;
    padding: 10px;
    animation: floatGlass 20s infinite ease-in-out;
    background: linear-gradient(135deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.03) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.05);
    border-top: 1px solid rgba(255,255,255,0.12);
    letter-spacing: 1px;
    transition: opacity 0.6s ease, transform 0.6s ease, color 0.3s;
    will-change: transform;
  }

  .bubble:hover {
    color: #0A84FF;
    border-color: rgba(10, 132, 255, 0.3);
  }

  @keyframes floatGlass {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(30px, -20px) rotate(2deg); }
  }

  .bubble:nth-child(1) { width: 110px; height: 48px; left: 10%; top: 20%; animation-delay: 0s; }
  .bubble:nth-child(2) { width: 100px; height: 45px; left: 80%; top: 15%; animation-delay: -3s; }
  .bubble:nth-child(3) { width: 115px; height: 48px; left: 50%; top: 75%; animation-delay: -6s; }
  .bubble:nth-child(4) { width: 90px; height: 42px; left: 15%; top: 78%; animation-delay: -9s; }
  .bubble:nth-child(5) { width: 105px; height: 46px; left: 82%; top: 50%; animation-delay: -12s; }
  .bubble:nth-child(6) { width: 95px; height: 44px; left: 45%; top: 25%; animation-delay: -15s; }

  /* CONTENU CENTRAL */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 30px;
    width: 100%;
    max-width: 380px;
  }

  /* LOGO TECH GLOW */
  .logo {
    width: 68px;
    height: 68px;
    margin: 0 auto 24px;
    background: #000;
    border: 2px solid transparent;
    background-image: linear-gradient(#000, #000), linear-gradient(135deg, #0A84FF, #BF5AF2);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
    box-shadow: 0 0 30px rgba(10,132,255,0.2), inset 0 0 15px rgba(191,90,242,0.2);
    animation: logoFloat 5s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -1px;
    background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    color: #555566;
    margin-bottom: 36px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* BOUTONS INTERACTIFS */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .btn {
    width: 100%;
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  /* BOUTON GOOGLE PREMIUM */
  .btn-google {
    background: #fff;
    border: none;
    color: #050508;
    box-shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
  }

  .btn-google:hover {
    transform: translateY(-2px);
    background: #ffffff;
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.25), 0 4px 20px rgba(0, 0, 0, 0.2);
  }

  .btn-google:active {
    transform: scale(0.98);
  }

  /* BOUTON RETOUR NEON OUTLINE */
  .btn-back {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .btn-back:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: #0A84FF;
    color: #fff;
    box-shadow: 0 0 15px rgba(10, 132, 255, 0.15);
    transform: translateY(-2px);
  }

  .btn-back:active {
    transform: scale(0.98);
  }

  .google-icon {
    width: 18px;
    height: 18px;
  }

  @media (max-width: 480px) {
    h1 { font-size: 34px; }
    .subtitle { font-size: 12px; margin-bottom: 30px; }
    .content { padding: 20px; }
  }
</style>
</head>
<body>

<div class="aurora"></div>

<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<div class="content">
  <div class="logo">AX</div>
  <h1>AurX AI</h1>
  <p class="subtitle">Session déconnectée</p>
  
  <div class="btn-group">
    <button class="btn btn-google" id="loginBtn">
      <svg class="google-icon" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9c0 1.45.347 2.825.957 4.04l3.007-2.328z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.96L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continuer avec Google
    </button>
    <button class="btn btn-back" id="backBtn">Retour à l'accueil</button>
  </div>
</div>

<script>
  const AUTH_URL = 'https://aur-x-backend.vercel.app/api/auth/google';
  const MAIN_URL = 'https://aurx.vercel.app/';
  
  const words = [
    'AURX', 'NEURAL', 'QUANTUM', 'CODER', 'BUILD',
    'INNOVATE', 'DEPLOY', 'SCALE', 'OPTIMIZE', 'DESIGN',
    'ARCHITECT', 'FUTURE', 'SMART', 'AUTO', 'SYNC',
    'PYTHON', 'RUST', 'REACT', 'VUE', 'NODE',
    'VISION', 'VOICE', 'CHAT', 'GEN AI', 'LLM',
    'FIRMINX', 'RDC', 'KINSHASA', 'AFRICA', 'NEXT',
    'CLOUD', 'EDGE', 'API', 'SECURE', 'FAST',
    'LEARN', 'CREATE', 'THINK', 'SOLVE', 'SHIP'
  ];

  const bubbles = document.querySelectorAll('.bubble');
  
  function initWords() {
    bubbles.forEach(bubble => {
      bubble.textContent = words[Math.floor(Math.random() * words.length)];
    });
  }

  function changeWords() {
    bubbles.forEach(bubble => {
      bubble.style.opacity = '0';
      setTimeout(() => {
        bubble.textContent = words[Math.floor(Math.random() * words.length)];
        bubble.style.opacity = '0.7';
      }, 600);
    });
  }

  initWords();
  setInterval(changeWords, 5000);

  document.getElementById('loginBtn').addEventListener('click', () => {
    window.location.href = AUTH_URL;
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = MAIN_URL;
  });
</script>

</body>
</html>
