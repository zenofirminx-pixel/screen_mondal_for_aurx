<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AurX AI - Déconnecté</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* BULLES ANIMÉES LENTES - STYLE PUB TV */
  .bubbles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #000;
    text-align: center;
    padding: 12px;
    animation: floatSlow 60s infinite ease-in-out, colorPulse 12s infinite ease-in-out;
    opacity: 0.8;
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 
                inset 0 1px 0 rgba(255,255,255,0.25);
    transition: opacity 1.2s ease;
  }

  @keyframes floatSlow {
    0%, 100% { 
      transform: translate(0, 0) scale(1); 
    }
    33% { 
      transform: translate(80px, -60px) scale(1.05); 
    }
    66% { 
      transform: translate(-60px, 70px) scale(0.95); 
    }
  }

  @keyframes colorPulse {
    0%, 100% { 
      background: linear-gradient(135deg, #0A84FF, #5AC8FA);
      box-shadow: 0 0 50px rgba(10,132,255,0.5), 0 8px 32px rgba(0,0,0,0.5);
    }
    20% { 
      background: linear-gradient(135deg, #30D158, #32D74B);
      box-shadow: 0 0 50px rgba(48,209,88,0.5), 0 8px 32px rgba(0,0,0,0.5);
    }
    40% { 
      background: linear-gradient(135deg, #FF9F0A, #FFD60A);
      box-shadow: 0 0 50px rgba(255,159,10,0.5), 0 8px 32px rgba(0,0,0,0.5);
    }
    60% { 
      background: linear-gradient(135deg, #BF5AF2, #DA8FFF);
      box-shadow: 0 0 50px rgba(191,90,242,0.5), 0 8px 32px rgba(0,0,0,0.5);
    }
    80% { 
      background: linear-gradient(135deg, #FF375F, #FF6482);
      box-shadow: 0 0 50px rgba(255,55,95,0.5), 0 8px 32px rgba(0,0,0,0.5);
    }
  }

  .bubble:nth-child(1) { width: 130px; height: 130px; left: 10%; top: 20%; animation-delay: 0s, 0s; }
  .bubble:nth-child(2) { width: 95px; height: 95px; left: 70%; top: 15%; animation-delay: -10s, -2s; }
  .bubble:nth-child(3) { width: 115px; height: 115px; left: 50%; top: 60%; animation-delay: -20s, -4s; }
  .bubble:nth-child(4) { width: 85px; height: 85px; left: 20%; top: 70%; animation-delay: -30s, -6s; }
  .bubble:nth-child(5) { width: 105px; height: 105px; left: 80%; top: 50%; animation-delay: -40s, -8s; }
  .bubble:nth-child(6) { width: 100px; height: 100px; left: 40%; top: 30%; animation-delay: -50s, -10s; }
  .bubble:nth-child(7) { width: 90px; height: 90px; left: 65%; top: 75%; animation-delay: -15s, -3s; }
  .bubble:nth-child(8) { width: 80px; height: 80px; left: 28%; top: 45%; animation-delay: -25s, -7s; }

  /* CONTENU CENTRAL */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 20px;
    max-width: 600px;
  }

  h1 {
    font-size: 56px;
    font-weight: 800;
    margin-bottom: 12px;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 18px;
    color: #666;
    margin-bottom: 50px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* BOUTONS */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
  }

  .btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #fff, #e0e0e0);
    border: none;
    border-radius: 14px;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(255,255,255,0.1);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(255,255,255,0.2);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn-back {
    background: linear-gradient(135deg, #FF375F, #FF6482);
    border: none;
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,55,95,0.3);
  }

  .btn-back:hover {
    box-shadow: 0 6px 30px rgba(255,55,95,0.5);
  }

  .btn-back:active {
    background: linear-gradient(135deg, #E02E4F, #E05872);
  }

  .google-icon {
    width: 20px;
    height: 20px;
  }

  @media (max-width: 768px) {
    h1 { font-size: 40px; }
    .subtitle { font-size: 16px; }
    .bubble { font-size: 10px; padding: 8px; }
  }
</style>
</head>
<body>

<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<div class="content">
  <h1>AurX AI</h1>
  <p class="subtitle">Session terminée</p>
  
  <div class="btn-group">
    <button class="btn" id="loginBtn">
      <svg class="google-icon" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9c0 1.45.347 2.825.957 4.04l3.007-2.328z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.96L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Se reconnecter avec Google
    </button>
    <button class="btn btn-back" id="backBtn">Fermer la page</button>
  </div>
</div>

<script>
  const AUTH_URL = 'https://aur-x-backend.vercel.app/api/auth/google';
  
  // Mots qui tournent dans les bulles
  const words = [
    'AurX AI', 'Apprendre', 'Coder', 'Créer', 'Innover',
    'Analyser', 'Générer', 'Résoudre', 'Concevoir', 'Explorer',
    'Préparer le futur', 'Automatiser', 'Optimiser', 'Développer',
    'Architecte IA', 'Neural Net', 'Machine Learning', 'Data Science',
    'Python', 'JavaScript', 'React', 'Node.js', 'Vision',
    'Assistant', 'Productivité', 'Créativité', 'Performance',
    'Scalable', 'Cloud', 'API', 'Backend', 'Frontend',
    'RDC Tech', 'FIRMINX', 'Future', 'Next Gen', 'Smart',
    'Quantum', 'Web3', 'Blockchain', 'Secure', 'Fast'
  ];

  // Change les mots des bulles
  const bubbles = document.querySelectorAll('.bubble');
  
  function changeWords() {
    bubbles.forEach(bubble => {
      bubble.style.opacity = '0';
      setTimeout(() => {
        const randomWord = words[Math.floor(Math.random() * words.length)];
        bubble.innerHTML = randomWord.replace(' ', '<br>');
        bubble.style.opacity = '0.8';
      }, 600);
    });
  }

  // Init mots
  bubbles.forEach(bubble => {
    const randomWord = words[Math.floor(Math.random() * words.length)];
    bubble.innerHTML = randomWord.replace(' ', '<br>');
  });

  // Change toutes les 5 secondes - vitesse pub TV
  setInterval(changeWords, 5000);

  // Boutons
  document.getElementById('loginBtn').addEventListener('click', () => {
    window.location.href = AUTH_URL;
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.close();
    setTimeout(() => {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#666;font-size:18px;font-family:-apple-system,sans-serif;">Tu peux fermer cet onglet</div>';
    }, 100);
  });
</script>

</body>
</html>
